<!DOCTYPE html>
<html>
<head>
<title>The Archive</title>

<style>
body{
    background:#0b0b0b;
    color:#d6d6d6;
    font-family: monospace;
    max-width:700px;
    margin:auto;
}

h1{
    text-align:center;
    color:#7df9ff;
}

.entry{
    border:1px solid #333;
    padding:10px;
    margin:10px 0;
    cursor:pointer;
}

.entry:hover{
    background:#111;
}

.hidden{
    display:none;
    margin-top:8px;
}
</style>

</head>

<body>

<h1>ARCHIVE NODE</h1>

<div class="entry" onclick="toggle('e1')">
Entry 001 — Opening Log
<div id="e1" class="hidden">
The archive has been initialized.  
Memory fragments are now being catalogued.
</div>
</div>

<div class="entry" onclick="toggle('e2')">
Entry 002 — Fragment
<div id="e2" class="hidden">
“Bird fights its way out of the egg…”  
Fragments referencing Abraxas detected.
</div>
</div>

<div class="entry" onclick="toggle('e3')">
Entry 003 — Signal
<div id="e3" class="hidden">
Signal detected.  
Origin unknown.
</div>
</div>

<script>
function toggle(id){
  let element = document.getElementById(id);

  if(element.style.display === "block"){
      element.style.display = "none";
  } else {
      element.style.display = "block";
  }
}
</script>

</body>
</html>
